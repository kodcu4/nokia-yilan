name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v3
    - name: Build APK
      uses: ArtemSBulgakov/buildozer-action@v1
      with:
        command: buildozer android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: nokia-yilan-apk
        path: bin/*.apk
